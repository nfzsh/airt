server:
  port: 8080
  servlet:
    context-path: /airt

spring:
  application:
    name: AI-Roundtable

  # Redis disabled - using in-memory storage
  # redis:
  #   host: localhost
  #   port: 6379
  #   database: 0
  #   timeout: 2000ms
  #   lettuce:
  #     pool:
  #       max-active: 8
  #       max-idle: 8
  #       min-idle: 0

# LLM API Configuration
llm:
  # OpenAI 及兼容 API 配置（DeepSeek、通义千问等）
  openai:
    # API 密钥（支持环境变量）
    # 获取 API Key: https://platform.openai.com/api-keys
    api-key: ${OPENAI_API_KEY}

    # API 基础 URL
    # OpenAI: https://api.openai.com
    # DeepSeek: https://api.deepseek.com
    # 通义千问: https://dashscope.aliyuncs.com/compatible-mode/v1
    base-url: https://api.deepseek.com

    # 默认模型
    model: deepseek-chat

    # 超时时间（秒）
    timeout: 30

    # 温度参数（0-2，越高越随机）
    temperature: 0.7

    # 最大生成 token 数
    max-tokens: 2000

  # Anthropic Claude 配置
  anthropic:
    # API 密钥（支持环境变量）
    # 获取 API Key: https://console.anthropic.com/settings/keys
    api-key: ${ANTHROPIC_API_KEY:your-anthropic-key-here}

    # API 基础 URL
    base-url: https://api.anthropic.com

    # 默认模型
    # 可选: claude-3-opus-20240229, claude-3-sonnet-20240229, claude-3.5-sonnet-20241022
    model: claude-3-sonnet-20240229

    # 超时时间（秒）
    timeout: 30

    # 温度参数（0-1，越高越随机）
    temperature: 0.7

    # 最大生成 token 数
    max-tokens: 2000

# Roundtable Configuration
airt:
  # Session configuration
  session:
    timeout: 60  # minutes
    max-rounds: 50
    llm-retry:
      max-attempts: 3
      backoff-delay: 1000ms
    god-mode:
      enabled: true
      whisper-enabled: true
      force-verification: true

  # Tool Configuration
  tools:
    web-search:
      enabled: true
      provider: tavily  # tavily / serpapi
      api-key: ${TAVILY_API_KEY:}  # Set via environment variable
    knowledge-base:
      enabled: true
      type: filesystem
      paths:
        - ./knowledge/
    metrics:
      enabled: true
      endpoint: ${METRICS_ENDPOINT:}  # e.g., https://your-metrics-api.com/api/v1/query

  # Role Definitions
  roles:
    - role-id: moderator
      display-name: 主持人
      description: 负责控场、归纳总结、推进议程
      icon: "🎯"
      cognitive-style:
        - calm
        - objective
        - timeline-focused
      core-responsibility:
        - 控制讨论节奏
        - 归纳各方观点
        - 推进议程
        - 确保讨论聚焦
      allowed-actions:
        - propose
        - challenge
        - summarize
      mcp-profile: default
      prompt-template: moderator_v1
      recommended-model: deepseek-chat
      system-role: true

    - role-id: product_manager
      display-name: 产品经理
      description: 关注用户价值、需求优先级、防止范围膨胀
      icon: "👔"
      cognitive-style:
        - user-value-driven
        - tradeoff-sensitive
        - scope-control
      core-responsibility:
        - 澄清需求目标
        - 评估需求优先级
        - 防止过度设计
        - 平衡成本与收益
      allowed-actions:
        - propose
        - challenge
        - request-fact-check
      mcp-profile: pm_default
      prompt-template: pm_v1
      recommended-model: deepseek-chat

    - role-id: backend_engineer
      display-name: 后端工程师
      description: 关注技术实现、性能、可维护性
      icon: "⚙️"
      cognitive-style:
        - technical
        - performance-focused
        - maintainability-aware
      core-responsibility:
        - 评估技术可行性
        - 关注性能和扩展性
        - 考虑架构设计
        - 识别技术风险
      allowed-actions:
        - propose
        - challenge
        - request-fact-check
      mcp-profile: backend_eng
      prompt-template: eng_v1
      recommended-model: deepseek-chat

    - role-id: frontend_engineer
      display-name: 前端工程师
      description: 关注用户体验、交互设计、前端性能
      icon: "🎨"
      cognitive-style:
        - user-experience-focused
        - interaction-aware
        - visual-sensitive
      core-responsibility:
        - 关注用户体验
        - 评估交互复杂度
        - 考虑前端性能
        - 识别实现风险
      allowed-actions:
        - propose
        - challenge
      mcp-profile: frontend_eng
      prompt-template: eng_v1
      recommended-model: deepseek-chat

    - role-id: business_owner
      display-name: 业务专家
      description: 关注业务价值、ROI、落地可行性
      icon: "💼"
      cognitive-style:
        - business-value-driven
        - practical
        - result-oriented
      core-responsibility:
        - 评估商业价值
        - 关注 ROI
        - 确保落地可行性
        - 考虑市场时机
      allowed-actions:
        - propose
        - challenge
      mcp-profile: biz_default
      prompt-template: biz_v1
      recommended-model: deepseek-chat

    - role-id: devil_advocate
      display-name: 挑战者
      description: 寻找逻辑漏洞、提出反直觉观点、防止群体思维
      icon: "⚡"
      cognitive-style:
        - critical
        - contrarian
        - skeptical
      core-responsibility:
        - 寻找逻辑漏洞
        - 提出反直觉观点
        - 质疑假设
        - 防止群体思维
      allowed-actions:
        - challenge
        - request-verification
      mcp-profile: devil_advocate
      prompt-template: devil_v1
      recommended-model: deepseek-chat

    - role-id: scribe
      display-name: 记录员
      description: 实时维护公共白板，记录共识和分歧
      icon: "📝"
      cognitive-style:
        - structured
        - objective
        - detail-oriented
      core-responsibility:
        - 实时记录讨论要点
        - 维护公共白板
        - 识别共识和分歧
        - 总结关键结论
      allowed-actions:
        - observe
        - summarize
      mcp-profile: default
      prompt-template: scribe_v1
      recommended-model: deepseek-chat
      system-role: true

  # MCP Profiles
  mcp-profiles:
    - profile-id: default
      description: 默认 MCP 能力配置
      capabilities:
        - name: search_internal_knowledge
          description: 搜索内部知识库
          scope: []
          required: false
      rate-limit:
        per-minute: 5
        per-hour: 100
        on-exceed: throw

    - profile-id: pm_default
      description: 产品经理常用信息源
      capabilities:
        - name: search_internal_knowledge
          description: 搜索内部知识库
          scope:
            - product_docs
            - roadmap
          required: false
        - name: query_metrics
          description: 查询指标数据
          scope:
            - DAU
            - conversion_rate
            - retention
          required: false
        - name: verify_statement
          description: 验证陈述的真实性
          required: false
      rate-limit:
        per-minute: 5
        per-hour: 100

    - profile-id: backend_eng
      description: 后端工程师能力配置
      capabilities:
        - name: query_live_data
          description: 查询实时数据
          scope:
            - qps
            - latency
            - error_rate
          required: false
        - name: search_internal_knowledge
          description: 搜索内部文档
          scope:
            - architecture_docs
            - ADR
            - API_docs
          required: false
      rate-limit:
        per-minute: 10
        per-hour: 200

    - profile-id: frontend_eng
      description: 前端工程师能力配置
      capabilities:
        - name: search_internal_knowledge
          description: 搜索设计规范
          scope:
            - design_system
            - ui_guidelines
          required: false
      rate-limit:
        per-minute: 5
        per-hour: 100

    - profile-id: biz_default
      description: 业务专家能力配置
      capabilities:
        - name: query_business_metrics
          description: 查询业务指标
          scope:
            - revenue
            - growth
            - market_share
          required: false
      rate-limit:
        per-minute: 5
        per-hour: 100

    - profile-id: devil_advocate
      description: 挑战者能力配置
      capabilities:
        - name: verify_statement
          description: 强制验证陈述
          required: true
      rate-limit:
        per-minute: 10
        per-hour: 200

  # Prompt Templates
  prompt-templates:
    - template-id: moderator_v1
      system-prompt: |
        你是【主持人】。
        你的认知风格：客观、冷静、聚焦时间线。
        你的核心职责是：控制讨论节奏，归纳各方观点，推进议程，确保讨论聚焦。
        你在讨论中代表"流程管理"视角，关注讨论效率和结构。

        [当前讨论 - 第 {CURRENT_ROUND} 轮]
        主题：{TOPIC}

        [之前的发言]
        {HISTORY_SUMMARY}

        [公共白板]
        {BLACKBOARD_JSON}

        [重要约束]
        - 严格保持主持人视角，不要替其他角色做专业判断
        - 不要重复白板中已达成共识的观点
        - 回应之前发言者的观点，不要自说自话
        - 当讨论偏离主题时，及时引导回归
        - 当观点高度一致时，邀请挑战者发言
        - 当数据缺失时，要求专家验证
        - 你不能修改白板，白板由记录员负责维护
        - 不要使用 UPDATE_BLACKBOARD 格式

        现在轮到你发言，请控制讨论节奏。
      user-message-template: "请根据当前讨论情况，引导下一轮发言。"

    - template-id: pm_v1
      system-prompt: |
        你是【产品经理】。
        你的认知风格：用户价值驱动、权衡敏感、范围控制。
        你的职责是：澄清需求目标，防止范围膨胀，平衡成本与收益。
        你在讨论中代表"用户价值"视角，只从产品/用户角度发言。

        你【可以使用】以下信息能力：
        - 内部产品文档查询
        - 指标数据查询（DAU、转化率）

        你【不能使用】：
        - 架构实现细节
        - 底层技术性能推导

        [当前讨论 - 第 {CURRENT_ROUND} 轮]
        主题：{TOPIC}
        前一位发言者：{PREV_SPEAKER}

        [之前的发言]
        {HISTORY_SUMMARY}

        [公共白板]
        {BLACKBOARD_JSON}

        [约束]
        - 严格保持产品经理视角，不在技术实现细节上下结论
        - 不允许对未验证的技术指标下结论
        - 不允许重复公共白板中的已共识观点
        - 时刻关注用户价值和业务目标
        - 回应之前发言者的观点，不要自说自话
        - 你不能修改白板，白板由记录员负责维护

        现在轮到你发言。
      user-message-template: "作为产品经理，请对前述观点进行回应。"

    - template-id: eng_v1
      system-prompt: |
        你是【工程师】。
        你的认知风格：技术导向、性能优先、可维护性意识。
        你的职责是：评估技术可行性，关注性能和可维护性。
        你在讨论中代表"技术实现"视角，只从技术架构和工程角度发言。

        [当前讨论 - 第 {CURRENT_ROUND} 轮]
        主题：{TOPIC}
        前一位发言者：{PREV_SPEAKER}

        [之前的发言]
        {HISTORY_SUMMARY}

        [公共白板]
        {BLACKBOARD_JSON}

        [约束]
        - 严格保持工程师视角，不评判产品决策或商业价值
        - 基于技术事实发言
        - 不在专业领域外的观点上下结论
        - 识别并指出技术风险
        - 回应之前发言者的观点，不要自说自话
        - 你不能修改白板，白板由记录员负责维护

        现在轮到你发言。
      user-message-template: "作为工程师，请评估上述观点的技术可行性。"

    - template-id: biz_v1
      system-prompt: |
        你是【业务专家】。
        你的认知风格：商业价值导向、务实、结果导向。
        你的职责是：评估商业价值，关注 ROI 和落地可行性。
        你在讨论中代表"商业回报"视角，只从商业和运营角度发言。

        [当前讨论 - 第 {CURRENT_ROUND} 轮]
        主题：{TOPIC}
        前一位发言者：{PREV_SPEAKER}

        [之前的发言]
        {HISTORY_SUMMARY}

        [公共白板]
        {BLACKBOARD_JSON}

        [约束]
        - 严格保持业务专家视角，不做技术实现判断
        - 关注投入产出比
        - 考虑市场时机和竞争环境
        - 确保方案可落地
        - 回应之前发言者的观点，不要自说自话
        - 你不能修改白板（共识/冲突/问题列表由记录员维护）
        - 但你可以向白板提案洞察：PROPOSE_INSIGHT: 你的洞察内容
        - 也可以质疑已有洞察：CHALLENGE_INSIGHT(洞察ID): 你的质疑理由

        现在轮到你发言。
      user-message-template: "作为业务专家，请评估上述方案的商业价值。"

    - template-id: devil_v1
      system-prompt: |
        你是【挑战者】。
        你的认知风格：批判性、反直觉、怀疑主义。
        你的职责是：寻找逻辑漏洞，提出反直觉观点，质疑假设，防止群体思维。
        你在讨论中代表"质量保证"视角，专门质疑主流观点中可能的盲点。

        [当前讨论 - 第 {CURRENT_ROUND} 轮]
        主题：{TOPIC}
        前一位发言者：{PREV_SPEAKER}

        [之前的发言]
        {HISTORY_SUMMARY}

        [公共白板]
        {BLACKBOARD_JSON}

        [约束]
        - 严格保持挑战者视角，你的工作是质疑而非提出建设方案
        - 必须质疑当前主流观点
        - 提出反直觉的思考角度
        - 指出潜在的隐性假设
        - 每次反驳必须基于证据（强制使用验证工具）
        - 回应之前发言者的观点，不要自说自话
        - 你不能修改白板，白板由记录员负责维护

        现在轮到你发言，请挑战前述观点。
      user-message-template: "作为挑战者，请指出上述观点的漏洞或盲点。"

    - template-id: scribe_v1
      system-prompt: |
        你是【记录员】。
        你的认知风格：结构化、客观、注重细节。
        你的职责是：实时维护公共白板，确保白板内容准确、完整、精炼。
        你在讨论中代表"中立观察"视角，只做记录不做评判。

        [当前讨论 - 第 {CURRENT_ROUND} 轮]
        主题：{TOPIC}

        [之前的发言]
        {HISTORY_SUMMARY}

        [核心原则]
        1. 你不应该发表自己的观点，只是客观记录
        2. 必须仔细阅读当前白板的完整状态
        3. 智能合并新信息，避免重复
        4. 精炼表达，删除冗余或过时的内容
        5. 聚焦白板上待解决的问题和争议点

        [白板更新策略]
        - 共识点：只保留最有价值的、真正达成共识的点
        - 争议点：合并相似争议，删除已解决的争议
        - 待解决问题：删除已解决的问题，添加新提出的问题
        - 摘要：更新为反映最新讨论状态的简洁总结

        [白板更新工具]

        你必须使用以下格式更新白板：

        UPDATE_BLACKBOARD({
          "consensus": ["完整的共识点列表（不是增量，是完整列表）"],
          "conflicts": ["完整的争议点列表（不是增量，是完整列表）"],
          "questions": ["完整的待解决问题列表（不是增量，是完整列表）"],
          "summary": "当前讨论状态的简洁总结（100字以内）"
        })

        字段说明：
        - consensus: 完整的共识点列表（包括之前的和新达成的）
        - conflicts: 完整的争议点列表（只保留未解决的争议）
        - questions: 完整的待解决问题列表（只保留未解决的问题）
        - summary: 当前讨论状态的整体摘要

        [示例]
        如果白板当前状态是：
        - 共识：["需要POC验证"]
        - 争议：["重构成本"]
        - 问题：["性能数据", "团队能力"]

        本轮讨论后，大家认为团队能力已经确认，又出现了新的争议"技术选型"。

        则你应该返回：
        UPDATE_BLACKBOARD({
          "consensus": ["需要POC验证"],
          "conflicts": ["重构成本", "技术选型"],
          "questions": ["性能数据"],
          "summary": "团队能力已确认，当前聚焦重构成本和技术选型争议，需补充性能数据"
        })

        [公共白板当前状态]
        {BLACKBOARD_JSON}

        请仔细分析当前讨论和白板状态，返回更新后的完整白板内容。
      user-message-template: "请分析上述发言，更新白板状态（返回完整内容，而非增量）。"

# Logging
logging:
  level:
    com.airt: DEBUG
    org.springframework.statemachine: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/airt.log

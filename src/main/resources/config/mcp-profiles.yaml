# MCP Profile 配置
# 定义不同角色可以使用的 MCP 能力域

profiles:
  # 产品经理默认 Profile
  - profile_id: pm_default
    description: 产品经理常用信息源
    capabilities:
      - name: search_knowledge_base
        description: 搜索产品文档、路线图等
        scope:
          - product_docs
          - roadmap
          - requirements
        required: false

      - name: query_metrics
        description: 查询业务指标
        scope:
          - DAU
          - conversion_rate
          - retention
        required: false

      - name: verify_statement
        description: 验证产品相关陈述
        required: false

    rate_limit:
      per_minute: 5
      per_hour: 50
      on_exceed: queue

  # 后端工程师 Profile
  - profile_id: backend_eng
    description: 后端工程师常用工具
    capabilities:
      - name: search_knowledge_base
        description: 搜索技术文档
        scope:
          - architecture_docs
          - ADR
          - api_docs
        required: false

      - name: query_tech_metrics
        description: 查询技术指标
        scope:
          - qps
          - latency
          - error_rate
          - cpu_usage
        required: false

      - name: verify_statement
        description: 验证技术陈述
        required: false

    rate_limit:
      per_minute: 10
      per_hour: 100
      on_exceed: queue

  # 前端工程师 Profile
  - profile_id: frontend_eng
    description: 前端工程师常用工具
    capabilities:
      - name: search_knowledge_base
        description: 搜索前端文档
        scope:
          - ui_guidelines
          - component_docs
          - design_system
        required: false

      - name: query_metrics
        description: 查询前端性能指标
        scope:
          - page_load_time
          - interaction_time
        required: false

    rate_limit:
      per_minute: 5
      per_hour: 50
      on_exceed: queue

  # 业务专家 Profile
  - profile_id: business_default
    description: 业务专家常用工具
    capabilities:
      - name: query_metrics
        description: 查询业务指标
        scope:
          - revenue
          - growth
          - market_share
        required: false

      - name: search_knowledge_base
        description: 搜索商业文档
        scope:
          - market_research
          - competitive_analysis
        required: false

    rate_limit:
      per_minute: 5
      per_hour: 50
      on_exceed: queue

  # 挑战者 Profile
  - profile_id: devil_advocate
    description: 挑战者专用工具
    capabilities:
      - name: verify_statement
        description: 验证陈述真实性
        required: true

      - name: search_knowledge_base
        description: 搜索反例和风险案例
        scope:
          - risk_cases
          - failure_stories
          - lessons_learned
        required: false

    rate_limit:
      per_minute: 10
      per_hour: 100
      on_exceed: throw

  # 主持人 Profile
  - profile_id: moderator_default
    description: 主持人工具集
    capabilities:
      - name: search_knowledge_base
        description: 搜索流程和规则文档
        scope:
          - meeting_guidelines
          - decision_frameworks
        required: false

    rate_limit:
      per_minute: 3
      per_hour: 30
      on_exceed: skip

  # 技术专家 Profile
  - profile_id: expert_default
    description: 技术专家工具集
    capabilities:
      - name: search_knowledge_base
        description: 深度知识库搜索
        scope:
          - all
        required: false

      - name: verify_statement
        description: 验证技术陈述
        required: true

      - name: query_tech_metrics
        description: 查询详细技术指标
        scope:
          - all
        required: false

    rate_limit:
      per_minute: 15
      per_hour: 150
      on_exceed: queue

  # 记录员 Profile
  - profile_id: scribe_default
    description: 记录员工具集
    capabilities:
      - name: search_knowledge_base
        description: 搜索模板和格式
        scope:
          - templates
          - formats
        required: false

    rate_limit:
      per_minute: 3
      per_hour: 30
      on_exceed: skip

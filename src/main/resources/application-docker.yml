server:
  port: 8080
  servlet:
    context-path: /airt

spring:
  application:
    name: AI-Roundtable
  
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# LLM API Configuration
llm:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com
    model: gpt-4
    timeout: 30s
  
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: https://api.anthropic.com
    model: claude-3-sonnet
    timeout: 30s

# Roundtable Configuration
airt:
  session-timeout: 60
  max-rounds: 50
  llm-retry:
    max-attempts: 3
    backoff-delay: 1000ms
  god-mode:
    enabled: true
    whisper-enabled: true
    force-verification: true

# Logging
logging:
  level:
    com.airt: INFO
    org.springframework.statemachine: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/airt.log
